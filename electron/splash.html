<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeadPulse</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Oxanium', system-ui, -apple-system, sans-serif;
      -webkit-app-region: drag;
      user-select: none;
    }

    .logo-container {
      position: relative;
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
    }

    .pulse-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid rgba(250, 204, 21, 0.3);
      animation: pulse 2s ease-in-out infinite;
    }

    .pulse-ring:nth-child(2) {
      animation-delay: 0.5s;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.15); opacity: 0; }
    }

    .logo {
      width: 80px;
      height: 80px;
      position: relative;
      z-index: 1;
    }

    .logo svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 20px rgba(250, 204, 21, 0.4));
    }

    .app-name {
      color: #fafafa;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 32px;
    }

    .loader {
      width: 120px;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 1px;
      overflow: hidden;
    }

    .loader-bar {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #facc15, transparent);
      border-radius: 1px;
      animation: slide 1.5s ease-in-out infinite;
    }

    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#facc15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>
      </svg>
    </div>
  </div>
  <div class="app-name">LeadPulse</div>
  <div class="loader">
    <div class="loader-bar"></div>
  </div>
</body>
</html>
